<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 210" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <marker id="p" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 z" fill="#64748b"/></marker>
  </defs>
  <text x="20" y="30" font-size="13" font-weight="700" fill="#334155">Monomer (e.g. ethylene)</text>
  <circle cx="60" cy="90" r="14" fill="#8a8f98"/><text x="60" y="95" text-anchor="middle" font-size="12" fill="#fff">C1</text>
  <circle cx="140" cy="90" r="14" fill="#8a8f98"/><text x="140" y="95" text-anchor="middle" font-size="12" fill="#fff">C2</text>
  <line x1="74" y1="84" x2="126" y2="84" stroke="#64748b" stroke-width="2.5"/>
  <line x1="74" y1="96" x2="126" y2="96" stroke="#64748b" stroke-width="2.5"/>
  <text x="100" y="132" text-anchor="middle" font-size="12" fill="#d08700">pick C1 &amp; C2 as anchors</text>
  <path d="M175 90 h50" stroke="#64748b" stroke-width="2" marker-end="url(#p)"/>
  <text x="200" y="78" text-anchor="middle" font-size="11" fill="#64748b">double bond<tspan x="200" dy="14">opens</tspan></text>

  <text x="250" y="30" font-size="13" font-weight="700" fill="#334155">Repeat unit</text>
  <circle cx="270" cy="90" r="12" fill="#8a8f98"/>
  <circle cx="330" cy="90" r="12" fill="#8a8f98"/>
  <line x1="282" y1="90" x2="318" y2="90" stroke="#64748b" stroke-width="2.5"/>
  <line x1="258" y1="90" x2="240" y2="90" stroke="#64748b" stroke-width="2" stroke-dasharray="3 3"/>
  <line x1="342" y1="90" x2="360" y2="90" stroke="#64748b" stroke-width="2" stroke-dasharray="3 3"/>
  <path d="M375 90 h40" stroke="#64748b" stroke-width="2" marker-end="url(#p)"/>

  <text x="440" y="30" font-size="13" font-weight="700" fill="#334155">Chain (× Repeats)</text>
  <line x1="440" y1="120" x2="740" y2="120" stroke="#64748b" stroke-width="2.5"/>
  <circle cx="450" cy="120" r="9" fill="#8a8f98"/><circle cx="490" cy="120" r="9" fill="#8a8f98"/>
  <circle cx="530" cy="120" r="9" fill="#8a8f98"/><circle cx="570" cy="120" r="9" fill="#8a8f98"/>
  <circle cx="610" cy="120" r="9" fill="#8a8f98"/><circle cx="650" cy="120" r="9" fill="#8a8f98"/>
  <circle cx="690" cy="120" r="9" fill="#8a8f98"/><circle cx="730" cy="120" r="9" fill="#8a8f98"/>
  <line x1="470" y1="120" x2="470" y2="100" stroke="#64748b" stroke-width="2"/>
  <line x1="550" y1="120" x2="550" y2="140" stroke="#64748b" stroke-width="2"/>
  <line x1="630" y1="120" x2="630" y2="100" stroke="#64748b" stroke-width="2"/>
  <line x1="710" y1="120" x2="710" y2="140" stroke="#64748b" stroke-width="2"/>
  <text x="590" y="175" text-anchor="middle" font-size="12" fill="#64748b">side groups spiral around the backbone</text>
</svg>
