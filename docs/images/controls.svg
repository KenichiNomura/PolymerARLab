<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 340" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <text x="20" y="24" fill="#64748b" font-size="16" font-weight="700">Buttons at the top-left corner</text>

  <!-- Camera -->
  <rect x="20" y="40" width="60" height="60" rx="13" fill="#12211f" stroke="#2a3b38"/>
  <svg x="20" y="40" width="60" height="60" viewBox="-3 -3 30 30"><g fill="none" stroke="#e6fffb" stroke-width="1.6" stroke-linejoin="round">
    <path d="M4 8.5A1.5 1.5 0 0 1 5.5 7h1.7l1-1.6a1 1 0 0 1 .85-.47h5.9a1 1 0 0 1 .85.47l1 1.6h1.7A1.5 1.5 0 0 1 20 8.5v8A1.5 1.5 0 0 1 18.5 18h-13A1.5 1.5 0 0 1 4 16.5v-8Z"/>
    <circle cx="12" cy="12.4" r="3.1"/>
  </g></svg>
  <text x="50" y="118" fill="#334155" font-size="13" font-weight="700" text-anchor="middle">Camera</text>
  <text x="50" y="134" fill="#64748b" font-size="11" text-anchor="middle">start scanning</text>

  <!-- Reset -->
  <rect x="190" y="40" width="60" height="60" rx="13" fill="#12211f" stroke="#2a3b38"/>
  <svg x="190" y="40" width="60" height="60" viewBox="-3 -3 30 30"><g fill="none" stroke="#e6fffb" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <path d="M5 12a7 7 0 1 1 2.05 4.95"/>
    <path d="M5 7.5V12h4.5"/>
  </g></svg>
  <text x="220" y="118" fill="#334155" font-size="13" font-weight="700" text-anchor="middle">Reset view</text>
  <text x="220" y="134" fill="#64748b" font-size="11" text-anchor="middle">recenter</text>

  <!-- Clear -->
  <rect x="360" y="40" width="60" height="60" rx="13" fill="#12211f" stroke="#2a3b38"/>
  <svg x="360" y="40" width="60" height="60" viewBox="-3 -3 30 30"><g fill="none" stroke="#e6fffb" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <path d="M6 7h12M9.5 7V5.6a1 1 0 0 1 1-1h3a1 1 0 0 1 1 1V7M8 7l.7 11a1.5 1.5 0 0 0 1.5 1.4h3.6a1.5 1.5 0 0 0 1.5-1.4L17 7"/>
  </g></svg>
  <text x="390" y="118" fill="#334155" font-size="13" font-weight="700" text-anchor="middle">Clear</text>
  <text x="390" y="134" fill="#64748b" font-size="11" text-anchor="middle">remove molecule</text>

  <!-- AR View -->
  <rect x="530" y="40" width="60" height="60" rx="13" fill="#12211f" stroke="#d08700"/>
  <svg x="530" y="40" width="60" height="60" viewBox="-3 -3 30 30"><g fill="none" stroke="#f4c66b" stroke-width="1.6" stroke-linejoin="round">
    <path d="M12 3.2 19.5 7.4v9.2L12 20.8 4.5 16.6V7.4L12 3.2Z"/>
    <path d="M4.7 7.5 12 11.7l7.3-4.2M12 11.7v8.9"/>
  </g></svg>
  <text x="560" y="118" fill="#334155" font-size="13" font-weight="700" text-anchor="middle">AR View</text>
  <text x="560" y="134" fill="#64748b" font-size="11" text-anchor="middle">place in AR (iPhone)</text>

  <text x="20" y="196" fill="#64748b" font-size="16" font-weight="700">Buttons at the bottom-left corner</text>

  <!-- Edit -->
  <rect x="20" y="212" width="60" height="60" rx="13" fill="#12211f" stroke="#2a3b38"/>
  <svg x="20" y="212" width="60" height="60" viewBox="-3 -3 30 30"><g fill="none" stroke="#e6fffb" stroke-width="1.6" stroke-linejoin="round">
    <path d="M14.7 6.3l3 3M4.5 16.2 15 5.7a1.6 1.6 0 0 1 2.3 0l1 1a1.6 1.6 0 0 1 0 2.3L7.8 19.5l-4 1 1-4Z"/>
  </g></svg>
  <text x="50" y="290" fill="#334155" font-size="13" font-weight="700" text-anchor="middle">Edit</text>
  <text x="50" y="306" fill="#64748b" font-size="11" text-anchor="middle">main controls</text>

  <!-- Status -->
  <rect x="190" y="212" width="60" height="60" rx="13" fill="#12211f" stroke="#2a3b38"/>
  <svg x="190" y="212" width="60" height="60" viewBox="-3 -3 30 30"><g fill="none" stroke="#e6fffb" stroke-width="1.6">
    <circle cx="12" cy="12" r="8.2"/>
    <circle cx="12" cy="8.1" r="1.05" fill="#e6fffb" stroke="none"/>
    <path d="M12 11.2v5.2" stroke-linecap="round"/>
  </g></svg>
  <text x="220" y="290" fill="#334155" font-size="13" font-weight="700" text-anchor="middle">Status</text>
  <text x="220" y="306" fill="#64748b" font-size="11" text-anchor="middle">atoms &amp; bonds info</text>

  <!-- Tutorial -->
  <rect x="360" y="212" width="60" height="60" rx="13" fill="#12211f" stroke="#2a3b38"/>
  <svg x="360" y="212" width="60" height="60" viewBox="-3 -3 30 30"><g fill="none" stroke="#e6fffb" stroke-width="1.6" stroke-linejoin="round">
    <path d="M12 6.5C10.3 5.3 7.9 5 6 5.2v11.2c1.9-.2 4.3.1 6 1.3 1.7-1.2 4.1-1.5 6-1.3V5.2c-1.9-.2-4.3.1-6 1.3Z"/>
    <path d="M12 6.5v11.5"/>
  </g></svg>
  <text x="390" y="290" fill="#334155" font-size="13" font-weight="700" text-anchor="middle">Tutorial</text>
  <text x="390" y="306" fill="#64748b" font-size="11" text-anchor="middle">this guide</text>
</svg>
