<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#101211" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <title>Polymer AR Lab</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #101211;
        color: #f7f3e8;
      }

      * { box-sizing: border-box; }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #101211;
      }

      body {
        min-width: 320px;
      }

      button,
      select,
      input,
      textarea {
        font: inherit;
      }

      button,
      select,
      textarea,
      input[type="text"] {
        min-height: 36px;
        border: 1px solid rgba(247, 243, 232, 0.22);
        border-radius: 6px;
        background: rgba(247, 243, 232, 0.1);
        color: #f7f3e8;
      }

      input[type="text"] {
        width: 100%;
        min-width: 0;
        padding: 0 10px;
      }

      button {
        cursor: pointer;
        padding: 0 12px;
        white-space: nowrap;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.48;
      }

      select {
        width: 100%;
        padding: 0 10px;
      }

      textarea {
        width: 100%;
        min-height: 76px;
        padding: 9px 10px;
        resize: vertical;
        line-height: 1.35;
      }

      input[type="range"] {
        width: 100%;
        accent-color: #44c7d8;
      }

      input[type="checkbox"] {
        width: 18px;
        height: 18px;
        accent-color: #36b37e;
      }

      #cameraFeed {
        position: fixed;
        inset: 0;
        display: none;
        width: 100vw;
        height: 100vh;
        object-fit: cover;
        background: #070807;
        z-index: 0;
      }

      body.camera-active #cameraFeed {
        display: block;
      }

      /* Scan viewfinder: only shown while the camera is active; the capture is
         cropped to #scanFrameBox so recognition sees just the framed drawing. */
      #scanFrame {
        position: fixed;
        inset: 0;
        z-index: 3;
        display: none;
        align-items: center;
        justify-content: center;
        pointer-events: none;
      }

      body.camera-active #scanFrame {
        display: flex;
      }

      #scanFrameBox {
        position: absolute;
        /* left/top/width/height are set inline by scanFrame.ts (default: centered 4:3). */
        border: 1px solid rgba(247, 243, 232, 0.55);
        border-radius: 14px;
        /* Spotlight scrim: dim everything outside the frame. */
        box-shadow: 0 0 0 100vmax rgba(0, 0, 0, 0.5);
        pointer-events: auto;
        touch-action: none;
        cursor: pointer;
      }

      .scan-corner {
        position: absolute;
        width: 34px;
        height: 34px;
        border: 3px solid #8fe3d0;
        pointer-events: auto;
        touch-action: none;
      }

      .scan-corner.tl { top: -2px; left: -2px; border-right: 0; border-bottom: 0; border-top-left-radius: 14px; cursor: nwse-resize; }
      .scan-corner.tr { top: -2px; right: -2px; border-left: 0; border-bottom: 0; border-top-right-radius: 14px; cursor: nesw-resize; }
      .scan-corner.bl { bottom: -2px; left: -2px; border-right: 0; border-top: 0; border-bottom-left-radius: 14px; cursor: nesw-resize; }
      .scan-corner.br { bottom: -2px; right: -2px; border-left: 0; border-top: 0; border-bottom-right-radius: 14px; cursor: nwse-resize; }

      .scan-hint {
        position: absolute;
        left: 50%;
        bottom: -30px;
        transform: translateX(-50%);
        pointer-events: none;
        white-space: nowrap;
        color: rgba(247, 243, 232, 0.9);
        font-size: 12px;
        font-weight: 700;
        text-shadow: 0 1px 3px rgba(0, 0, 0, 0.8);
      }

      #app {
        position: fixed;
        inset: 0;
        z-index: 1;
      }

      #app canvas {
        display: block;
        width: 100% !important;
        height: 100% !important;
      }

      #fallbackMolecule {
        position: fixed;
        inset: 92px 24px 260px;
        z-index: 2;
        display: none;
        align-items: center;
        justify-content: center;
        pointer-events: none;
      }

      body.webgl-fallback #fallbackMolecule,
      #fallbackMolecule.camera-overlay {
        display: flex;
      }

      #fallbackMolecule svg {
        width: min(100%, 900px);
        height: min(100%, 320px);
        overflow: visible;
      }

      #fallbackMolecule text {
        fill: #101211;
        font: 700 11px/1 system-ui, sans-serif;
        text-anchor: middle;
        pointer-events: none;
      }

      .topbar {
        position: fixed;
        top: max(12px, env(safe-area-inset-top));
        left: max(12px, env(safe-area-inset-left));
        right: max(12px, env(safe-area-inset-right));
        z-index: 12;
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 10px;
        align-items: start;
        pointer-events: none;
      }

      .icon-toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        min-width: 0;
        pointer-events: auto;
      }

      .icon-toolbar button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 40px;
        height: 40px;
        padding: 0;
        border: 1px solid rgba(247, 243, 232, 0.16);
        border-radius: 6px;
        background: rgba(16, 18, 17, 0.82);
        color: #f7f3e8;
        backdrop-filter: blur(18px);
        cursor: pointer;
      }

      .icon-toolbar button svg {
        width: 20px;
        height: 20px;
      }

      .icon-toolbar button:hover:not(:disabled) {
        background: rgba(247, 243, 232, 0.14);
      }

      .icon-toolbar button:disabled {
        opacity: 0.4;
        cursor: default;
      }

      .icon-toolbar button.is-active,
      .icon-toolbar button.is-ready {
        border-color: #ffd166;
        color: #ffd166;
        box-shadow: 0 0 0 1px rgba(255, 209, 102, 0.5);
      }

      #arEntry {
        display: flex;
        justify-content: flex-end;
        min-width: 132px;
        pointer-events: auto;
      }

      .status-panel {
        width: min(360px, calc(100vw - 24px));
        max-width: 100%;
        display: grid;
        gap: 8px;
        padding: 10px;
        border: 1px solid rgba(247, 243, 232, 0.16);
        border-radius: 8px;
        background: rgba(16, 18, 17, 0.88);
        box-shadow: 0 18px 50px rgba(0, 0, 0, 0.38);
        backdrop-filter: blur(18px);
        pointer-events: auto;
      }

      .status-panel[hidden] {
        display: none;
      }

      #webxrArButton {
        position: static !important;
        width: auto !important;
        min-width: 128px !important;
        height: 40px !important;
        margin: 0 !important;
        border-radius: 6px !important;
        border: 1px solid rgba(68, 199, 216, 0.7) !important;
        background: rgba(30, 74, 74, 0.9) !important;
        color: #f7f3e8 !important;
        font: 700 12px/1 system-ui, sans-serif !important;
      }

      /* Bottom-left dock: Edit/Status panels stack upward above the icon row,
         which stays pinned at the bottom because the dock is anchored there. */
      .dock {
        position: fixed;
        left: max(12px, env(safe-area-inset-left));
        bottom: max(12px, env(safe-area-inset-bottom));
        z-index: 11;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 10px;
        max-width: calc(100vw - 24px);
        pointer-events: none;
      }

      .control-panel {
        width: min(430px, calc(100vw - 24px));
        max-width: 100%;
        display: grid;
        gap: 10px;
        padding: 12px;
        border: 1px solid rgba(247, 243, 232, 0.16);
        border-radius: 8px;
        background: rgba(16, 18, 17, 0.88);
        box-shadow: 0 18px 50px rgba(0, 0, 0, 0.38);
        backdrop-filter: blur(18px);
        pointer-events: auto;
      }

      .control-panel[hidden] {
        display: none;
      }

      .field {
        display: grid;
        gap: 5px;
      }

      .field label,
      .toggle label {
        color: rgba(247, 243, 232, 0.72);
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .range-row,
      .toggle {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .range-row span {
        min-width: 28px;
        text-align: right;
        color: #f2b84b;
        font-weight: 800;
      }

      .summary {
        min-height: 43px;
        padding: 9px 10px;
        border-radius: 6px;
        background: rgba(247, 243, 232, 0.08);
        color: rgba(247, 243, 232, 0.88);
        font-size: 12px;
        line-height: 1.45;
        white-space: pre-line;
      }

      .control-section {
        display: grid;
        gap: 8px;
        padding: 10px;
        border: 1px solid rgba(247, 243, 232, 0.14);
        border-radius: 8px;
        background: rgba(247, 243, 232, 0.045);
      }

      .control-section:not([open]) {
        gap: 0;
      }

      .control-section > summary {
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        color: rgba(247, 243, 232, 0.72);
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.08em;
        list-style: none;
        text-transform: uppercase;
      }

      .control-section > summary::-webkit-details-marker {
        display: none;
      }

      .control-section > summary::after {
        content: "+";
        color: rgba(247, 243, 232, 0.58);
        font-size: 15px;
        line-height: 1;
      }

      .control-section[open] > summary {
        color: #f7f3e8;
      }

      .control-section[open] > summary::after {
        content: "-";
        color: #ffd166;
      }

      .hint {
        margin: 0;
        color: rgba(247, 243, 232, 0.66);
        font-size: 11px;
        line-height: 1.4;
      }

      /* Polymer builder panel: mechanism chooser, then numbered build steps. */
      .mode-btn {
        display: grid;
        gap: 2px;
        justify-items: start;
        min-height: 54px;
        padding: 8px 12px;
        text-align: left;
        white-space: normal;
      }

      .mode-btn small {
        color: rgba(247, 243, 232, 0.62);
        font-size: 11px;
      }

      .builder-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }

      .builder-head span {
        color: #ffd166;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .slot-toggle {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 6px;
      }

      .slot-toggle[hidden] {
        display: none;
      }

      .slot-toggle button {
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .slot-toggle button.is-active {
        border-color: #44c7d8;
        color: #8fe3d0;
        box-shadow: 0 0 0 1px rgba(68, 199, 216, 0.45);
      }

      #builderChooser,
      #builderSection {
        display: grid;
        gap: 10px;
      }

      #builderChooser[hidden],
      #builderSection[hidden] {
        display: none;
      }

      #builderStatus.is-error {
        color: #ff9d85;
      }

      body:not(.polymer-mode) .polymer-only {
        display: none;
      }

      .import-grid {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 6px;
      }

      .attachment-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 6px;
      }

      .attachment-grid label {
        display: grid;
        gap: 5px;
        color: rgba(247, 243, 232, 0.72);
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      #importStatus {
        color: rgba(247, 243, 232, 0.72);
        font-size: 12px;
        line-height: 1.35;
      }

      /* Shutter flash + "recognizing" spinner shown during a capture. */
      #captureFlash {
        position: fixed;
        inset: 0;
        z-index: 20;
        background: #ffffff;
        opacity: 0;
        pointer-events: none;
      }

      #captureFlash.flash {
        animation: shutter 260ms ease-out;
      }

      @keyframes shutter {
        0% { opacity: 0; }
        12% { opacity: 0.85; }
        100% { opacity: 0; }
      }

      #scanBusy {
        position: fixed;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        z-index: 21;
        display: none;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        padding: 18px 22px;
        border-radius: 12px;
        background: rgba(16, 18, 17, 0.82);
        backdrop-filter: blur(10px);
        pointer-events: none;
      }

      #scanBusy.is-on {
        display: flex;
      }

      .scan-spinner {
        width: 34px;
        height: 34px;
        border-radius: 50%;
        border: 3px solid rgba(247, 243, 232, 0.2);
        border-top-color: #8fe3d0;
        animation: scan-spin 0.8s linear infinite;
      }

      @keyframes scan-spin {
        to { transform: rotate(360deg); }
      }

      .scan-busy-label {
        color: rgba(247, 243, 232, 0.9);
        font-size: 13px;
        font-weight: 700;
      }

      .scan-strip {
        position: fixed;
        right: max(12px, env(safe-area-inset-right));
        bottom: max(12px, env(safe-area-inset-bottom));
        z-index: 10;
        width: min(300px, calc(100vw - 24px));
        display: grid;
        gap: 8px;
        padding: 10px;
        border: 1px solid rgba(247, 243, 232, 0.14);
        border-radius: 8px;
        background: rgba(16, 18, 17, 0.82);
        backdrop-filter: blur(18px);
      }

      #scanPreview {
        height: 98px;
        border: 1px dashed rgba(247, 243, 232, 0.2);
        border-radius: 6px;
        background:
          linear-gradient(135deg, rgba(54, 179, 126, 0.16), rgba(68, 199, 216, 0.1)),
          rgba(247, 243, 232, 0.06);
        background-position: center;
        background-size: cover;
      }

      #scanPreview.has-capture {
        border-style: solid;
      }

      #scanStatus,
      #mobileStatus,
      #platformStatus,
      #validationStatus {
        color: rgba(247, 243, 232, 0.72);
        font-size: 12px;
        line-height: 1.35;
      }

      #mobileStatus {
        min-height: 30px;
        padding: 8px 10px;
        border-radius: 6px;
        background: rgba(68, 199, 216, 0.08);
      }

      #mobileStatus.is-warning {
        color: #ffd166;
        background: rgba(242, 184, 75, 0.12);
      }

      #platformStatus {
        position: fixed;
        left: 50%;
        bottom: max(18px, env(safe-area-inset-bottom));
        z-index: 9;
        width: min(420px, calc(100vw - 24px));
        transform: translateX(-50%);
        padding: 9px 12px;
        border: 1px solid rgba(247, 243, 232, 0.12);
        border-radius: 8px;
        background: rgba(16, 18, 17, 0.78);
        text-align: center;
        backdrop-filter: blur(14px);
      }

      #scanCanvas {
        display: none;
      }

      @media (max-width: 900px) {
        .topbar {
          grid-template-columns: minmax(0, 1fr);
        }

        #arEntry {
          justify-content: flex-start;
        }

        .scan-strip {
          display: none;
        }

        #platformStatus {
          display: none;
        }
      }

      @media (max-width: 520px) {
        .control-panel {
          max-height: 54vh;
          overflow: auto;
          padding: 10px;
        }

        .import-grid,
        .attachment-grid {
          grid-template-columns: 1fr;
        }

        .summary,
        #mobileStatus,
        #validationStatus {
          font-size: 11px;
        }

        #fallbackMolecule {
          inset: 96px 8px 390px;
        }
      }
    </style>
  </head>
  <body>
    <video id="cameraFeed" autoplay muted playsinline></video>
    <div id="app"></div>
    <div id="fallbackMolecule"></div>

    <div id="scanFrame" aria-hidden="true">
      <div id="scanFrameBox">
        <span class="scan-corner tl"></span>
        <span class="scan-corner tr"></span>
        <span class="scan-corner bl"></span>
        <span class="scan-corner br"></span>
        <span class="scan-hint">Tap to capture &middot; drag edges to resize</span>
      </div>
    </div>

    <div id="captureFlash" aria-hidden="true"></div>
    <div id="scanBusy" aria-hidden="true">
      <span class="scan-spinner"></span>
      <span class="scan-busy-label">Recognizing&hellip;</span>
    </div>

    <header class="topbar">
      <div class="icon-toolbar">
        <button id="cameraModeBtn" type="button" aria-label="Camera" title="Camera" aria-pressed="false">
          <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path d="M4 8.5A1.5 1.5 0 0 1 5.5 7h1.7l1-1.6a1 1 0 0 1 .85-.47h5.9a1 1 0 0 1 .85.47l1 1.6h1.7A1.5 1.5 0 0 1 20 8.5v8A1.5 1.5 0 0 1 18.5 18h-13A1.5 1.5 0 0 1 4 16.5v-8Z" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
            <circle cx="12" cy="12.4" r="3.1" fill="none" stroke="currentColor" stroke-width="1.6"/>
          </svg>
        </button>
        <button id="resetViewBtn" type="button" aria-label="Reset view" title="Reset view">
          <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path d="M5 12a7 7 0 1 1 2.05 4.95" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
            <path d="M5 7.5V12h4.5" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <button id="clearBtn" type="button" aria-label="Clear" title="Clear">
          <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path d="M6 7h12M9.5 7V5.6a1 1 0 0 1 1-1h3a1 1 0 0 1 1 1V7M8 7l.7 11a1.5 1.5 0 0 0 1.5 1.4h3.6a1.5 1.5 0 0 0 1.5-1.4L17 7" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <button id="arQuickLookBtn" type="button" aria-label="AR View" title="AR View">
          <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path d="M12 3.2 19.5 7.4v9.2L12 20.8 4.5 16.6V7.4L12 3.2Z" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
            <path d="M4.7 7.5 12 11.7l7.3-4.2M12 11.7v8.9" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
      <div id="arEntry"></div>
    </header>

    <div class="dock">
      <div id="editPanel" class="control-panel" aria-label="Structure controls" hidden>
          <button id="uploadSketchBtn" type="button">Upload sketch</button>
          <input id="sketchFileInput" type="file" accept="image/*" hidden />

          <div class="import-grid">
            <input id="pubchemInput" type="text" placeholder="PubChem name or CID" aria-label="PubChem name or CID" spellcheck="false" />
            <button id="pubchemLoadBtn" type="button">Load</button>
          </div>

          <div class="toggle">
            <input id="labelsToggle" type="checkbox" />
            <label for="labelsToggle">Atom labels</label>
          </div>

          <div class="toggle">
            <input id="hydrogensToggle" type="checkbox" checked />
            <label for="hydrogensToggle">Show hydrogens</label>
          </div>

          <div id="importStatus">Loading chemistry...</div>
      </div>

      <div id="polymerPanel" class="control-panel" aria-label="Polymer builder" hidden>
        <div id="builderChooser">
          <div class="field">
            <label>Build a polymer &mdash; choose how it cures</label>
          </div>
          <button id="modeAdditionBtn" type="button" class="mode-btn">
            Addition cure
            <small>opens a C=C double bond, no byproduct</small>
          </button>
          <button id="modeCondensationBtn" type="button" class="mode-btn">
            Condensation cure
            <small>each new bond releases a small molecule (H&#8322;O or HCl)</small>
          </button>
        </div>

        <div id="builderSection" hidden>
          <div class="builder-head">
            <span id="builderTitle">Addition cure</span>
            <button id="builderResetBtn" type="button">&#10005; Start over</button>
          </div>

          <div class="field">
            <label>1 &middot; Load monomer(s)</label>
            <div id="slotToggle" class="slot-toggle">
              <button id="slotABtn" type="button" class="is-active">A: empty</button>
              <button id="slotBBtn" type="button">B: empty</button>
            </div>
            <div class="import-grid">
              <input id="builderPubchemInput" type="text" placeholder="PubChem name or CID" aria-label="PubChem name or CID" spellcheck="false" />
              <button id="builderPubchemLoadBtn" type="button">Load</button>
            </div>
            <button id="builderSketchBtn" type="button">Upload sketch</button>
          </div>

          <div class="field">
            <label id="anchorStepLabel">2 &middot; Pick the two anchor atoms</label>
            <div class="attachment-grid">
              <label for="anchorASelect">
                Anchor 1
                <select id="anchorASelect" disabled></select>
              </label>
              <label for="anchorBSelect">
                Anchor 2
                <select id="anchorBSelect" disabled></select>
              </label>
            </div>
            <p class="hint" id="mechanismHint"></p>
          </div>

          <div class="field">
            <label>3 &middot; Build the chain</label>
            <button id="makeRepeatUnitBtn" type="button" disabled>Make repeat unit</button>
            <div class="field polymer-only">
              <label for="repeatRange">Repeats</label>
              <div class="range-row">
                <input id="repeatRange" type="range" min="1" max="12" value="4" />
                <span id="repeatValue">4</span>
              </div>
            </div>
          </div>

          <p class="hint" id="builderStatus"></p>
        </div>
      </div>

      <div id="statusPanel" class="status-panel" hidden>
        <div id="structureSummary" class="summary"></div>
        <div id="mobileStatus"></div>
        <div id="validationStatus"></div>
      </div>

      <div class="icon-toolbar dock-bar">
        <button id="editToggleBtn" type="button" aria-label="Edit" title="Edit" aria-pressed="false">
          <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
