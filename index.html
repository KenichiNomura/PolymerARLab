<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#101211" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <title>Polymer AR Lab</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #101211;
        color: #f7f3e8;
      }

      * { box-sizing: border-box; }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #101211;
      }

      body {
        min-width: 320px;
      }

      button,
      select,
      input,
      textarea {
        font: inherit;
      }

      button,
      select,
      textarea,
      input[type="text"] {
        min-height: 36px;
        border: 1px solid rgba(247, 243, 232, 0.22);
        border-radius: 6px;
        background: rgba(247, 243, 232, 0.1);
        color: #f7f3e8;
      }

      input[type="text"] {
        width: 100%;
        min-width: 0;
        padding: 0 10px;
      }

      button {
        cursor: pointer;
        padding: 0 12px;
        white-space: nowrap;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.48;
      }

      select {
        width: 100%;
        padding: 0 10px;
      }

      textarea {
        width: 100%;
        min-height: 76px;
        padding: 9px 10px;
        resize: vertical;
        line-height: 1.35;
      }

      input[type="range"] {
        width: 100%;
        accent-color: #44c7d8;
      }

      input[type="checkbox"] {
        width: 18px;
        height: 18px;
        accent-color: #36b37e;
      }

      #cameraFeed {
        position: fixed;
        inset: 0;
        display: none;
        width: 100vw;
        height: 100vh;
        object-fit: cover;
        background: #070807;
        z-index: 0;
      }

      body.camera-active #cameraFeed {
        display: block;
      }

      #app {
        position: fixed;
        inset: 0;
        z-index: 1;
      }

      #app canvas {
        display: block;
        width: 100% !important;
        height: 100% !important;
      }

      #fallbackMolecule {
        position: fixed;
        inset: 92px 24px 260px;
        z-index: 2;
        display: none;
        align-items: center;
        justify-content: center;
        pointer-events: none;
      }

      body.webgl-fallback #fallbackMolecule,
      #fallbackMolecule.camera-overlay {
        display: flex;
      }

      #fallbackMolecule svg {
        width: min(100%, 900px);
        height: min(100%, 320px);
        overflow: visible;
      }

      #fallbackMolecule text {
        fill: #101211;
        font: 700 11px/1 system-ui, sans-serif;
        text-anchor: middle;
        pointer-events: none;
      }

      .topbar {
        position: fixed;
        top: max(12px, env(safe-area-inset-top));
        left: max(12px, env(safe-area-inset-left));
        right: max(12px, env(safe-area-inset-right));
        z-index: 12;
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 10px;
        align-items: start;
        pointer-events: none;
      }

      .icon-toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        min-width: 0;
        pointer-events: auto;
      }

      .icon-toolbar button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 40px;
        height: 40px;
        padding: 0;
        border: 1px solid rgba(247, 243, 232, 0.16);
        border-radius: 6px;
        background: rgba(16, 18, 17, 0.82);
        color: #f7f3e8;
        backdrop-filter: blur(18px);
        cursor: pointer;
      }

      .icon-toolbar button svg {
        width: 20px;
        height: 20px;
      }

      .icon-toolbar button:hover:not(:disabled) {
        background: rgba(247, 243, 232, 0.14);
      }

      .icon-toolbar button:disabled {
        opacity: 0.4;
        cursor: default;
      }

      .icon-toolbar button.is-active,
      .icon-toolbar button.is-ready {
        border-color: #ffd166;
        color: #ffd166;
        box-shadow: 0 0 0 1px rgba(255, 209, 102, 0.5);
      }

      #arEntry {
        display: flex;
        justify-content: flex-end;
        min-width: 132px;
        pointer-events: auto;
      }

      .status-panel {
        width: min(360px, calc(100vw - 24px));
        max-width: 100%;
        display: grid;
        gap: 8px;
        padding: 10px;
        border: 1px solid rgba(247, 243, 232, 0.16);
        border-radius: 8px;
        background: rgba(16, 18, 17, 0.88);
        box-shadow: 0 18px 50px rgba(0, 0, 0, 0.38);
        backdrop-filter: blur(18px);
        pointer-events: auto;
      }

      .status-panel[hidden] {
        display: none;
      }

      #webxrArButton {
        position: static !important;
        width: auto !important;
        min-width: 128px !important;
        height: 40px !important;
        margin: 0 !important;
        border-radius: 6px !important;
        border: 1px solid rgba(68, 199, 216, 0.7) !important;
        background: rgba(30, 74, 74, 0.9) !important;
        color: #f7f3e8 !important;
        font: 700 12px/1 system-ui, sans-serif !important;
      }

      /* Bottom-left dock: Edit/Status panels stack upward above the icon row,
         which stays pinned at the bottom because the dock is anchored there. */
      .dock {
        position: fixed;
        left: max(12px, env(safe-area-inset-left));
        bottom: max(12px, env(safe-area-inset-bottom));
        z-index: 11;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 10px;
        max-width: calc(100vw - 24px);
        pointer-events: none;
      }

      .control-panel {
        width: min(430px, calc(100vw - 24px));
        max-width: 100%;
        display: grid;
        gap: 10px;
        padding: 12px;
        border: 1px solid rgba(247, 243, 232, 0.16);
        border-radius: 8px;
        background: rgba(16, 18, 17, 0.88);
        box-shadow: 0 18px 50px rgba(0, 0, 0, 0.38);
        backdrop-filter: blur(18px);
        pointer-events: auto;
      }

      .control-panel[hidden] {
        display: none;
      }

      .field {
        display: grid;
        gap: 5px;
      }

      .field label,
      .toggle label {
        color: rgba(247, 243, 232, 0.72);
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .range-row,
      .button-row,
      .toggle {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .mode-toggle {
        justify-content: space-between;
        min-height: 36px;
        padding: 0 10px;
        border: 1px solid rgba(247, 243, 232, 0.16);
        border-radius: 6px;
        background: rgba(247, 243, 232, 0.07);
      }

      .range-row span {
        min-width: 28px;
        text-align: right;
        color: #f2b84b;
        font-weight: 800;
      }

      .button-row {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .button-row button,
      .button-row select {
        min-width: 0;
        padding: 0 8px;
      }

      .button-row .span-full {
        grid-column: 1 / -1;
      }

      .summary {
        min-height: 43px;
        padding: 9px 10px;
        border-radius: 6px;
        background: rgba(247, 243, 232, 0.08);
        color: rgba(247, 243, 232, 0.88);
        font-size: 12px;
        line-height: 1.45;
        white-space: pre-line;
      }

      .control-section {
        display: grid;
        gap: 8px;
        padding: 10px;
        border: 1px solid rgba(247, 243, 232, 0.14);
        border-radius: 8px;
        background: rgba(247, 243, 232, 0.045);
      }

      .control-section:not([open]) {
        gap: 0;
      }

      .control-section > summary {
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        color: rgba(247, 243, 232, 0.72);
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.08em;
        list-style: none;
        text-transform: uppercase;
      }

      .control-section > summary::-webkit-details-marker {
        display: none;
      }

      .control-section > summary::after {
        content: "+";
        color: rgba(247, 243, 232, 0.58);
        font-size: 15px;
        line-height: 1;
      }

      .control-section[open] > summary {
        color: #f7f3e8;
      }

      .control-section[open] > summary::after {
        content: "-";
        color: #ffd166;
      }

      .inline-section {
        display: grid;
        gap: 0;
        border: 1px solid rgba(247, 243, 232, 0.12);
        border-radius: 6px;
        background: rgba(7, 8, 7, 0.22);
      }

      .inline-section[open] {
        gap: 8px;
      }

      .inline-section summary {
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        min-height: 36px;
        padding: 0 10px;
        color: rgba(247, 243, 232, 0.76);
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.08em;
        list-style: none;
        text-transform: uppercase;
      }

      .inline-section summary::-webkit-details-marker {
        display: none;
      }

      .inline-section summary::after {
        content: "+";
        color: rgba(247, 243, 232, 0.58);
        font-size: 15px;
        line-height: 1;
      }

      .inline-section[open] summary::after {
        content: "-";
        color: #ffd166;
      }

      .inline-section-body {
        display: grid;
        gap: 8px;
        padding: 0 10px 10px;
      }

      .hint {
        margin: 0;
        color: rgba(247, 243, 232, 0.66);
        font-size: 11px;
        line-height: 1.4;
      }

      body:not(.polymer-mode) .polymer-only {
        display: none;
      }

      .section-body {
        display: grid;
        gap: 8px;
        padding-top: 8px;
      }

      .import-grid,
      .import-actions {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 6px;
      }

      .example-grid {
        display: grid;
        grid-template-columns: minmax(0, 1fr);
        gap: 6px;
      }

      .attachment-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 6px;
      }

      .attachment-grid label {
        display: grid;
        gap: 5px;
        color: rgba(247, 243, 232, 0.72);
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      #importStatus {
        color: rgba(247, 243, 232, 0.72);
        font-size: 12px;
        line-height: 1.35;
      }

      .scan-strip {
        position: fixed;
        right: max(12px, env(safe-area-inset-right));
        bottom: max(12px, env(safe-area-inset-bottom));
        z-index: 10;
        width: min(300px, calc(100vw - 24px));
        display: grid;
        gap: 8px;
        padding: 10px;
        border: 1px solid rgba(247, 243, 232, 0.14);
        border-radius: 8px;
        background: rgba(16, 18, 17, 0.82);
        backdrop-filter: blur(18px);
      }

      #scanPreview {
        height: 98px;
        border: 1px dashed rgba(247, 243, 232, 0.2);
        border-radius: 6px;
        background:
          linear-gradient(135deg, rgba(54, 179, 126, 0.16), rgba(68, 199, 216, 0.1)),
          rgba(247, 243, 232, 0.06);
        background-position: center;
        background-size: cover;
      }

      #scanPreview.has-capture {
        border-style: solid;
      }

      #scanStatus,
      #mobileStatus,
      #platformStatus,
      #validationStatus {
        color: rgba(247, 243, 232, 0.72);
        font-size: 12px;
        line-height: 1.35;
      }

      #mobileStatus {
        min-height: 30px;
        padding: 8px 10px;
        border-radius: 6px;
        background: rgba(68, 199, 216, 0.08);
      }

      #mobileStatus.is-warning {
        color: #ffd166;
        background: rgba(242, 184, 75, 0.12);
      }

      #platformStatus {
        position: fixed;
        left: 50%;
        bottom: max(18px, env(safe-area-inset-bottom));
        z-index: 9;
        width: min(420px, calc(100vw - 24px));
        transform: translateX(-50%);
        padding: 9px 12px;
        border: 1px solid rgba(247, 243, 232, 0.12);
        border-radius: 8px;
        background: rgba(16, 18, 17, 0.78);
        text-align: center;
        backdrop-filter: blur(14px);
      }

      #scanCanvas {
        display: none;
      }

      @media (max-width: 900px) {
        .topbar {
          grid-template-columns: minmax(0, 1fr);
        }

        #arEntry {
          justify-content: flex-start;
        }

        .scan-strip {
          display: none;
        }

        #platformStatus {
          display: none;
        }
      }

      @media (max-width: 520px) {
        .control-panel {
          max-height: 54vh;
          overflow: auto;
          padding: 10px;
        }

        .import-grid,
        .import-actions,
        .attachment-grid,
        .button-row {
          grid-template-columns: 1fr;
        }

        .summary,
        #mobileStatus,
        #validationStatus {
          font-size: 11px;
        }

        #fallbackMolecule {
          inset: 96px 8px 390px;
        }
      }
    </style>
  </head>
  <body>
    <video id="cameraFeed" autoplay muted playsinline></video>
    <div id="app"></div>
    <div id="fallbackMolecule"></div>

    <header class="topbar">
      <div class="icon-toolbar">
        <button id="cameraModeBtn" type="button" aria-label="Camera" title="Camera" aria-pressed="false">
          <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path d="M4 8.5A1.5 1.5 0 0 1 5.5 7h1.7l1-1.6a1 1 0 0 1 .85-.47h5.9a1 1 0 0 1 .85.47l1 1.6h1.7A1.5 1.5 0 0 1 20 8.5v8A1.5 1.5 0 0 1 18.5 18h-13A1.5 1.5 0 0 1 4 16.5v-8Z" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
            <circle cx="12" cy="12.4" r="3.1" fill="none" stroke="currentColor" stroke-width="1.6"/>
          </svg>
        </button>
        <button id="captureBtn" type="button" aria-label="Capture" title="Capture" disabled>
          <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <circle cx="12" cy="12" r="8" fill="none" stroke="currentColor" stroke-width="1.6"/>
            <circle cx="12" cy="12" r="4" fill="currentColor"/>
          </svg>
        </button>
        <button id="resetViewBtn" type="button" aria-label="Reset view" title="Reset view">
          <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path d="M5 12a7 7 0 1 1 2.05 4.95" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
            <path d="M5 7.5V12h4.5" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <button id="clearBtn" type="button" aria-label="Clear" title="Clear">
          <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path d="M6 7h12M9.5 7V5.6a1 1 0 0 1 1-1h3a1 1 0 0 1 1 1V7M8 7l.7 11a1.5 1.5 0 0 0 1.5 1.4h3.6a1.5 1.5 0 0 0 1.5-1.4L17 7" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <button id="arQuickLookBtn" type="button" aria-label="AR View" title="AR View">
          <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path d="M12 3.2 19.5 7.4v9.2L12 20.8 4.5 16.6V7.4L12 3.2Z" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
            <path d="M4.7 7.5 12 11.7l7.3-4.2M12 11.7v8.9" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
      <div id="arEntry"></div>
    </header>

    <div class="dock">
      <div id="editPanel" class="control-panel" aria-label="Structure controls" hidden>
          <div class="button-row">
            <button id="uploadSketchBtn" type="button">Upload sketch</button>
            <select id="exampleStructureSelect" aria-label="Polymer Examples"></select>
          </div>
          <input id="sketchFileInput" type="file" accept="image/*" hidden />

          <div class="import-grid">
            <input id="pubchemInput" type="text" placeholder="PubChem name or CID" aria-label="PubChem name or CID" spellcheck="false" />
            <button id="pubchemLoadBtn" type="button">Load</button>
          </div>

          <div class="toggle">
            <input id="labelsToggle" type="checkbox" />
            <label for="labelsToggle">Atom labels</label>
          </div>

          <div class="toggle">
            <input id="hydrogensToggle" type="checkbox" checked />
            <label for="hydrogensToggle">Show hydrogens</label>
          </div>

          <button id="saveLammpsBtn" type="button">Save LAMMPS (UFF)</button>

          <div class="toggle mode-toggle">
            <label for="polymerModeToggle">Polymer repeat unit</label>
            <input id="polymerModeToggle" type="checkbox" />
          </div>

          <select id="polymerSelect" hidden aria-hidden="true"></select>

          <div class="field polymer-only">
            <label for="repeatRange">Repeats</label>
            <div class="range-row">
              <input id="repeatRange" type="range" min="1" max="12" value="4" />
              <span id="repeatValue">4</span>
            </div>
          </div>

          <details id="makePolymerPanel" class="inline-section">
            <summary>Make Polymer from Monomer</summary>
            <div class="inline-section-body">
              <p class="hint">Pick the two backbone atoms by their labels (e.g. the C=C carbons C1 and C2); the double bond opens and the unit tiles into a chain.</p>
              <div class="attachment-grid">
                <label for="anchorASelect">
                  Anchor 1
                  <select id="anchorASelect" disabled></select>
                </label>
                <label for="anchorBSelect">
                  Anchor 2
                  <select id="anchorBSelect" disabled></select>
                </label>
              </div>
              <button id="makeRepeatUnitBtn" type="button" disabled>Make repeat unit</button>
            </div>
          </details>
          <div id="importStatus">Template library active.</div>
      </div>

      <div id="statusPanel" class="status-panel" hidden>
        <div id="structureSummary" class="summary"></div>
        <div id="mobileStatus"></div>
        <div id="validationStatus"></div>
      </div>

      <div class="icon-toolbar dock-bar">
        <button id="editToggleBtn" type="button" aria-label="Edit" title="Edit" aria-pressed="false">
          <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path d="M14.7 6.3l3 3M4.5 16.2 15 5.7a1.6 1.6 0 0 1 2.3 0l1 1a1.6 1.6 0 0 1 0 2.3L7.8 19.5l-4 1 1-4Z" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
          </svg>
        </button>
        <button id="statusToggleBtn" type="button" aria-label="Status" title="Status" aria-pressed="false">
          <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <circle cx="12" cy="12" r="8.2" fill="none" stroke="currentColor" stroke-width="1.6"/>
            <circle cx="12" cy="8.1" r="1.05" fill="currentColor"/>
            <path d="M12 11.2v5.2" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
    </div>

    <aside class="scan-strip" aria-label="Sketch scan">
      <div id="scanPreview"></div>
      <div id="scanStatus">Sketch capture standby.</div>
    </aside>

    <div id="platformStatus"></div>
    <canvas id="scanCanvas"></canvas>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
